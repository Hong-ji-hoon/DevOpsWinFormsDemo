name: WinForms .NET Framework CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore DevOpsWinFormsDemo\DevOpsWinFormsDemo.sln

      - name: Build solution
        run: msbuild DevOpsWinFormsDemo\DevOpsWinFormsDemo.sln /p:Configuration=Release

      - name: Run tests
        run: vstest.console.exe **\bin\Release\*Tests.dll